name: stylevault
description: A premium fashion store mobile application.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Firebase - all using compatible BoM versions
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  # State Management
  provider: ^6.1.1
  # Navigation
  go_router: ^13.2.0
  # UI
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  badges: ^3.1.2
  # Utils
  uuid: ^4.3.3
  intl: ^0.19.0
  shared_preferences: ^2.2.2
  image_picker: ^1.0.7
  cupertino_icons: ^1.0.6
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/